{% set version = "0.35.1" %}

package:
  name: larray
  version: {{ version }}

source:
  url: https://github.com/larray-project/larray/archive/{{ version }}.tar.gz
  sha256: 8f5ae308cdc593afda783c18701453d2a18ff8e445079bd0f87e5949e967d7b5

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools

  run:
    - python >={{ python_min }}
    - numpy >=1.22
    - pandas >=0.20

test:
  requires:
    - python {{ python_min }}
  imports:
    - larray

about:
  home: https://github.com/larray-project/larray
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: "N-dimensional labelled arrays in Python"
  description: |
    LArray is an open source Python library that aims to provide tools for
    easy exploration and manipulation of N-dimensional labelled data structures.
  doc_url: https://larray.readthedocs.io/
  dev_url: https://github.com/larray-project/larray

extra:
  recipe-maintainers:
    - alixdamman
    - gdementen
